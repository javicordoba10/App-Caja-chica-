<head>

  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.js"></script>
  <script type="text/javascript">
    window.PDFJS = pdfjsLib;
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.worker.js";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="text/javascript">
    async function performWebOCR(base64Data, isPdf) {
      try {
        let imageDataUrl = 'data:image/png;base64,' + base64Data;
        
        if (isPdf) {
          try {
            const res = await fetch('data:application/pdf;base64,' + base64Data);
            const blob = await res.blob();
            const arrayBuffer = await blob.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);
            
            const loadingTask = pdfjsLib.getDocument({data: uint8Array});
            const pdf = await loadingTask.promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({scale: 2.5}); 
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            imageDataUrl = canvas.toDataURL('image/jpeg', 0.8);
          } catch (pdfErr) {
            console.error('PDF Conversion Error:', pdfErr);
            return '[OCR PDF ERROR] ' + pdfErr.toString();
          }
        }

        try {
          const worker = await Tesseract.createWorker('spa');
          const result = await worker.recognize(imageDataUrl);
          await worker.terminate();
          
          if (!result || !result.data || !result.data.text) {
             return '[OCR EMPTY ERROR] No se detectó texto en el documento.';
          }
          return result.data.text;
        } catch (tessErr) {
          console.error('Tesseract Error:', tessErr);
          return '[OCR TESSERACT ERROR] ' + tessErr.toString();
        }
      } catch (e) {
        console.error('OCR Global Error:', e);
        return '[OCR GLOBAL ERROR] ' + e.toString();
      }
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
